<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento CT Titã</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #000;
            color: #fff;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 400px;
            /* Fundo centralizado e sem zoom excessivo */
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('logotipo.png');
            background-size: 50%; 
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        h1 { margin-top: 20px; font-size: 28px; color: #fff; text-transform: uppercase; }
        .subtitle { color: #ff0000; font-weight: bold; margin-bottom: 30px; letter-spacing: 1px; }

        .experience-card {
            border: 2px solid #ff0000;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 30px;
            background: rgba(255, 0, 0, 0.1);
        }

        .input-group {
            text-align: left;
            margin-bottom: 15px;
        }

        label { display: block; margin-bottom: 5px; font-size: 14px; color: #ccc; }

        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #1a1a1a;
            color: #fff;
            box-sizing: border-box;
            font-size: 16px;
            outline: none;
        }

        input:focus, select:focus { border-color: #ff0000; }

        .btn-confirm {
            width: 100%;
            padding: 15px;
            background: #cc0000;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }

        .btn-confirm:hover {
            background: #a30000;
            transform: scale(1.02);
        }

        footer { margin-top: 30px; font-size: 11px; opacity: 0.6; letter-spacing: 0.5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>CT TITÃ</h1>
    <div class="subtitle">AGENDAMENTO ONLINE</div>

    <div class="experience-card">
        <strong>AULA EXPERIMENTAL</strong><br>
        <span style="color: #ff0000; font-size: 18px;">1 SEMANA 100% GRATUITA</span>
    </div>

    <div class="input-group">
        <label>Nome Completo</label>
        <input type="text" id="nome" placeholder="Digite seu nome">
    </div>

    <div class="input-group">
        <label>WhatsApp</label>
        <input type="text" id="whatsapp" placeholder="(83) 99999-9999">
    </div>

    <div class="input-group">
        <label>Data de Início</label>
        <input type="date" id="data">
    </div>

    <div class="input-group">
        <label>Horário da Primeira Aula</label>
        <select id="horario">
            <option value="" disabled selected>Escolha o horário</option>
            <option value="06:00">06:00</option>
            <option value="07:00">07:00</option>
            <option value="11:00">11:00</option>
            <option value="12:00">12:00</option>
            <option value="16:00">16:00</option>
            <option value="17:00">17:00</option>
            <option value="18:00">18:00</option>
            <option value="19:00">19:00</option>
            <option value="20:00">20:00</option>
        </select>
    </div>

    <button class="btn-confirm" onclick="enviarWhatsApp()">CONFIRMAR AGENDAMENTO</button>

    <footer>Desenvolvido por AFinanceira Solutions</footer>
</div>

<script>
    function enviarWhatsApp() {
        const nome = document.getElementById('nome').value;
        const whatsapp = document.getElementById('whatsapp').value;
        const data = document.getElementById('data').value;
        const horario = document.getElementById('horario').value;

        if(!nome || !whatsapp || !data || !horario) {
            alert("Por favor, preencha todos os campos para garantir sua vaga.");
            return;
        }

        const dataFormatada = data.split('-').reverse().join('/');

        const mensagem = `Olá! Gostaria de agendar minha *1 SEMANA GRATUITA* no *CT TITÃ*.%0A%0A*Dados do Aluno:*%0A👤 Nome: ${nome}%0A📱 WhatsApp: ${whatsapp}%0A📅 Data de Início: ${dataFormatada}%0A🕒 Horário: ${horario}`;
        
        // Lembre-se de substituir os '0' abaixo pelo número real do CT Titã
        const numeroTelefone = "5583999999999"; 
        window.open(`https://wa.me/${numeroTelefone}?text=${mensagem}`, '_blank');
    }
</script>

</body>
</html>
